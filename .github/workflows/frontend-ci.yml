name: Frontend CI

on:
  push:
    branches: [dev, development]
  pull_request:
    branches: [dev, development]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DND-Performance-Assistant-Front-End/FrontEnd/dndpa

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: DND-Performance-Assistant-Front-End/FrontEnd/dndpa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build project
        run: npm run build
